<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8def8"/>
      <stop offset="1" stop-color="#8fd3f4"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="18" fill="url(#bg)" stroke="#20204f" stroke-width="3"/>
  <!-- ears -->
  <circle cx="20" cy="20" r="9" fill="#fff" stroke="#20204f" stroke-width="3"/>
  <circle cx="44" cy="20" r="9" fill="#fff" stroke="#20204f" stroke-width="3"/>
  <circle cx="20" cy="20" r="3.5" fill="#ffd0e0"/>
  <circle cx="44" cy="20" r="3.5" fill="#ffd0e0"/>
  <!-- head -->
  <circle cx="32" cy="36" r="18" fill="#fff" stroke="#20204f" stroke-width="3"/>
  <!-- cheeks -->
  <circle cx="22" cy="40" r="4" fill="#ffc4d8"/>
  <circle cx="42" cy="40" r="4" fill="#ffc4d8"/>
  <!-- eyes -->
  <circle cx="26" cy="34" r="2.6" fill="#20204f"/>
  <circle cx="38" cy="34" r="2.6" fill="#20204f"/>
  <!-- nose + mouth -->
  <ellipse cx="32" cy="40" rx="2.6" ry="2.1" fill="#20204f"/>
  <path d="M32 42 q-3 3 -6 1 M32 42 q3 3 6 1" fill="none" stroke="#20204f" stroke-width="2" stroke-linecap="round"/>
</svg>
